version: 2
updates:
  # GitHub Actions – group all action bumps into one PR per month
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-actions:
        patterns:
          - "*"

  # ── NPM – Solution / app directories only (mirrors the CI build matrix) ──
  # Starter directories are intentionally omitted: they are always kept in
  # sync with their Solution counterpart manually, so tracking them separately
  # would only produce duplicate PRs.
  #
  # Each entry uses a group so that when several packages are bumped at once
  # (e.g. React + Vite + Vitest all release together) they land in a single PR
  # instead of one PR per package.
  #
  # Schedule is monthly (not weekly) to keep PR volume manageable: all 16
  # Solution directories share the same dependency set, so every release would
  # otherwise open 16 PRs at once. Monthly batching cuts that to ~12 rounds
  # per year instead of ~52.

  - package-ecosystem: "npm"
    directory: "/fundamentals/jsx-expressions/Solution"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/state-management/managing-state/Solution"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/state-management/all-together/Solution"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

