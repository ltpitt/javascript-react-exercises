version: 2
updates:
  # GitHub Actions – group all action bumps into one PR per week
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns:
          - "*"

  # NPM version updates are handled by the update-npm-deps.yml workflow
  # instead of Dependabot. That workflow runs once a month and opens a
  # single PR covering all exercise directories, rather than one PR per
  # directory. Dependabot security alerts still fire independently of this
  # file and are not affected by this choice.
