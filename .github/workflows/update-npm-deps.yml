name: Update npm Dependencies

# Runs on the 1st of every month and can also be triggered manually.
# Instead of the 16+ Dependabot PRs that would otherwise open whenever a
# shared dependency releases a new version, this workflow refreshes every
# package-lock.json in one shot and opens a single PR.
on:
  schedule:
    - cron: '0 0 1 * *'   # 00:00 UTC on the 1st of each month
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Refresh all package-lock.json files
        run: |
          find . -name "package.json" \
            ! -path "*/node_modules/*" \
            ! -path "*/.github/*" \
            -execdir npm install --package-lock-only \;

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="deps/npm-update-$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore(deps): monthly npm lock-file refresh"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(deps): monthly npm dependency update" \
            --body "Automated monthly npm lock-file refresh across all exercise directories.

All \`package-lock.json\` files have been regenerated with \`npm install --package-lock-only\`, picking up the latest versions that satisfy the ranges declared in each \`package.json\`.

Please review, ensure CI is green, then merge." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
